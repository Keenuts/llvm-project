if not "SPIRV" in config.root.targets:
    config.unsupported = True

if config.spirv_tools_tests:
    config.available_features.add("spirv-tools")
    config.substitutions.append(("spirv-dis", os.path.join(config.llvm_tools_dir, "spirv-dis")))
    config.substitutions.append(("spirv-val", os.path.join(config.llvm_tools_dir, "spirv-val")))

spirv_sim_root = os.path.join(config.llvm_src_root, "utils", "spirv-simulator")
config.substitutions.append(("spirv-sim", os.path.join(spirv_sim_root, "spirv-sim.py")))

